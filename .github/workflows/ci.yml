name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]


jobs:
  frontend:
    name: Frontend - build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
      
      - name: Start Vite Preview Server
        run: npx vite preview --port 4173 &

      - name: Wait for server
        run: npx wait-on http://localhost:4173

      - name: Smoke Test
        run: |
          response=$(curl -o /dev/null -s -w "%{http_code}\n" http://localhost:4173)
          if [ "$response" -ne 200 ]; then
            echo "Smoke test failed with HTTP status: $response"
            exit 1
          fi
          echo "Smoke test passed! React app is built and serving successfully."

  backend:
    name: Backend - install & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/pyproject.toml

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Install formatting tools
        shell: bash
        run: |
          # install black and flake8 for formatting checks
          pip install black flake8

      - name: Lint
        shell: bash
        run: |
          # Adjust to your tools if different (ruff/flake8/pylint/etc.)
          if command -v ruff >/dev/null 2>&1; then ruff check .; else echo "ruff not installed; skipping"; fi
          flake8 . --max-line-length=150 --exit-zero

      - name: Build ML models
        shell: bash
        run: |
          # train scripts create the joblib artifacts required by the API
          python -m backend.ml.train_hoang
          python -m backend.ml.train_ant

      - name: Smoke test
        shell: bash
        env:
          JWT_SECRET: "testsecret"
        run: |
          # start the backend in the background
          python -m uvicorn main:app --host 127.0.0.1 --port 8001 &
          SERVER_PID=$!
          
          # Poll the /health endpoint for up to 30 seconds
          TIMEOUT=30
          while ! curl -sSf http://127.0.0.1:8001/health | grep -q "status"; do
            sleep 1
            TIMEOUT=$((TIMEOUT-1))
            if [ $TIMEOUT -le 0 ]; then
              echo "Smoke test failed: Server did not start within 30 seconds."
              kill $SERVER_PID || true
              exit 1
            fi
          done
          
          echo "Smoke test passed"
          kill $SERVER_PID
      - name: Test
        shell: bash
        env:
          JWT_SECRET: "testsecret"
        run: |
          # Adjust to your test runner if different
          if command -v pytest >/dev/null 2>&1; then pytest -q; else echo "pytest not installed; skipping"; fi
